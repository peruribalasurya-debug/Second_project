name: ci

on:
  push:
  pull_request:

jobs:
  smoke:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Import + basic CLI help
        run: |
          python -c "import anomaly_system; print(anomaly_system.__version__)"
          python -m anomaly_system.train --help
          python -m anomaly_system.serve --help

